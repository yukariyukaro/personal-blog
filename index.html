<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-project</title>
    <!-- 预加载自定义字体，赋予最高优先级 -->
    <link rel="preload" href="https://cdn.jsdelivr.net/gh/yukariyukaro/mycdn@main/SmileySans-Oblique.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <style>
      /* 全局 Loading 关键样式 */
      @font-face {
        font-family: 'SmileySans';
        src: url('https://cdn.jsdelivr.net/gh/yukariyukaro/mycdn@main/SmileySans-Oblique.ttf') format('truetype');
        font-display: block; /* 改为 block 防止首屏字体突变 (FOUT) */
      }

      body {
        margin: 0;
        font-family: 'SmileySans', system-ui, sans-serif; /* 全局使用得意黑体 */
      }

      #global-loading {
        position: fixed;
        inset: 0;
        background-color: #ffffff;
        z-index: 9999;
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        padding: 5vw;
        transition: opacity 0.5s ease, visibility 0.5s ease;
        font-family: 'SmileySans', system-ui, sans-serif;
      }

      #global-loading.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loading-container {
        display: flex;
        align-items: flex-end;
        gap: 1rem;
      }

      .loading-image {
        width: 10rem;
        height: auto;
        object-fit: contain;
      }

      .loading-text-container {
        display: flex;
        flex-direction: column;
        color: #39C5BB; /* miku色 */
      }

      .loading-title-wrapper {
        display: flex;
        align-items: flex-end;
        border-bottom: 4px solid #39C5BB;
        padding-bottom: 4px;
        border-radius: 2px;
      }

      .loading-title {
        display: flex;
        align-items: baseline;
        font-size: 3rem;
        line-height: 1;
        font-weight: bold;
        letter-spacing: 0.05em;
        margin: 0;
        /* 可爱的字体描边和阴影效果 (贴纸风格) */
        color: #39C5BB;
        -webkit-text-stroke: 1px #020202;
        text-shadow: 
          3px 3px 0 #2ca097, 
          4px 4px 5px rgba(0, 0, 0, 0.15);
      }

      /* 错落有致的文字排版 */
      .loading-title span {
        display: inline-block;
        transform-origin: bottom center;
      }

      /* 第一、三个文字同高度、大小稍大 */
      .loading-title .char-1,
      .loading-title .char-3 {
        font-size: 1.1em;
        transform: translateY(-0.2em);
      }

      /* 第四个文字大小稍大，高度与二、五一致（贴底） */
      .loading-title .char-4 {
        font-size: 1.1em;
      }

      /* 第二、五个文字稍小，高度偏低（贴底） */
      .loading-title .char-2,
      .loading-title .char-5 {
        font-size: 0.85em;
      }

      .loading-subtitle {
        font-size: 1.5rem;
        line-height: 1.5;
        align-self: flex-end;
        padding-top: 4px;
        margin: 0;
        animation: loading-blink 1.5s infinite;
        /* 副标题同样增加微弱的描边使其更清晰 */
        color: #39C5BB;
        text-shadow: 1px 1px 0 #2ca097;
      }

      @keyframes loading-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      @media (prefers-reduced-motion: reduce) {
        .loading-subtitle {
          animation: none;
        }
      }

      @media (max-width: 768px) {
        .loading-image {
          width: 80px;
        }
        .loading-title {
          font-size: 2rem;
        }
        .loading-subtitle {
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- 全局 Loading DOM -->
    <div id="global-loading" aria-label="Loading" role="status" aria-live="polite">
      <div class="loading-container">
        <img class="loading-image" src="/吃葱.webp" alt="loading" />
        <div class="loading-text-container">
          <div class="loading-title-wrapper">
            <h1 class="loading-title">
              <span class="char-1">少</span>
              <span class="char-2">女</span>
              <span class="char-3">吃</span>
              <span class="char-4">葱</span>
              <span class="char-5">中</span>
            </h1>
          </div>
          <p class="loading-subtitle">Now Loading...</p>
        </div>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
